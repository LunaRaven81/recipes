<!DOCTYPE html>
<html lang="de">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rezepte :)</title>
        <link rel="stylesheet" href="../style/style.css">
    </head>

    <body>
        <header>
            <nav>
                <button id="home" class="mobileToo"><img src="../images/style/logo.png" alt="Logo" id="logo"></button>
                <!-- TODO: Hauptmahlzeit usw als Dropdowns -->
                <button id="main">Hauptmahlzeit</button>
                <button id="snack">Snack</button>
                <button id="dessert">Dessert</button>
                <button id="galery">Galerie</button>
                <button id="login">Login</button>
                <section id="burgernav">
                    <button id="burgerbutton" class="mobileToo"><img src="../images/style/menu.png" alt="Menu"></button>
                    <div id="burgermenu">
                        <ul>
                            <li><button id="mobileMain" class="mobileToo">Hauptmahlzeit</button></li>
                            <li><button id="mobileSnack" class="mobileToo">Snack</button></li>
                            <li><button id="mobileDessert" class="mobileToo">Dessert</button></li>
                            <li><button id="mobileGalery" class="mobileToo">Galerie</button></li>
                            <li><button id="mobileLogin" class="mobileToo">Login</button></li>
                        </ul>
                    </div>
                </section>
            </nav>
        </header>
        <main class="login">
            <!--TODO: Potenziell Passwortregeln definieren-->
            <form action="login.html">
                <label for="username"><h3>Benutzername</h3></label>
                <input type="text" id="username" name="username" required>
                <label for="password"><h3>neues Passwort</h3></label>
                <input type="password" id="password" name="password" required>
                <label for="repeatPassword"><h3>Passwort wiederholen</h3></label>
                <input type="password" id="repeatPassword" name="repeatPassword" required>
                <!--Sendebutton-->
                <input type="submit" value="Passwort zurücksetzen">
            </form>
        </main>
        <footer>
            <p>By <a href="https://github.com/LunaRaven81">LunaRaven81</a></p>
            <nav>
                <button id="about">About</button>
                <button id="feedback">Feedback</button>
            </nav>
        </footer>
        <script src="../scripts/script.js"></script>
    </body>

</html>
